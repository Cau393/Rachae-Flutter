name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  supabase_flutter: ^2.12.0
  app_links: ^6.4.1
  url_launcher: ^6.3.2
  dio: ^5.7.0
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  decimal: ^3.0.2
  flutter_svg: ^2.2.0
  image_picker: ^1.0.7
  pdf: ^3.10.8
  printing: ^5.12.0
  google_mobile_ads: ^5.3.1
  app_tracking_transparency: ^2.0.6+1
  purchases_flutter: ^9.16.0
  purchases_ui_flutter: ^9.16.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
